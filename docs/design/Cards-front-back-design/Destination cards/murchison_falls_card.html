<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Like a Ugandan — Murchison Falls</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2C2C2A;
    font-family: 'DM Sans', sans-serif;
    padding: 30px 16px;
  }
  .card {
    width: 252px;
    height: 352px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.2);
  }
  .scene { position: absolute; inset: 0; }
  .scene svg { display: block; }

  /* Region badge — top left */
  .region-badge {
    position: absolute; top: 10px; left: 10px; z-index: 5;
  }
  .region-dot {
    width: 34px; height: 34px; border-radius: 50%;
    background: #E8B84D; border: 2px solid rgba(255,255,255,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #3D2B1F;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  /* Top overlay — title area */
  .top-overlay {
    position: absolute; top: 0; left: 0; right: 0; z-index: 3;
    padding: 14px 14px 44px;
    background: linear-gradient(to bottom, rgba(15,8,3,.85) 0%, rgba(15,8,3,.65) 55%, transparent 100%);
    text-align: center;
  }
  .brand-line {
    font-size: 6px; letter-spacing: .25em; text-transform: uppercase;
    color: rgba(255,255,255,.4); margin-bottom: 2px;
  }
  .dest-label {
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: #E8B84D; font-weight: 600; margin-bottom: 2px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 900; color: #fff;
    line-height: 1.0;
    text-shadow: 0 2px 10px rgba(0,0,0,.5);
  }

  /* Fact — vertically centered */
  .fact-area {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 4; width: 218px; text-align: center;
    background: rgba(15, 8, 3, .55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid rgba(232, 184, 77, .2);
  }
  .fact-line {
    width: 32px; height: 1.5px; background: #E8B84D;
    margin: 0 auto 8px; border-radius: 1px;
  }
  .fact-text {
    font-size: 12px; line-height: 1.6; color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,.7), 0 0 20px rgba(0,0,0,.5);
  }
  .fact-line-bottom {
    width: 32px; height: 1.5px; background: #E8B84D;
    margin: 8px auto 0; border-radius: 1px;
  }

  /* Bottom overlay — QR code */
  .bottom-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
    padding: 30px 14px 12px;
    background: linear-gradient(to top, rgba(15,8,3,.8) 0%, rgba(15,8,3,.5) 50%, transparent 100%);
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }
  .qr-wrap {
    display: flex; flex-direction: column; align-items: center;
  }
  .qr-box {
    width: 38px; height: 38px;
    border: 1.5px solid rgba(232,184,77,.6); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.9);
  }
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px; width: 24px; height: 24px;
  }
  .qr-grid span { border-radius: 1px; }
  .qr-grid span.d { background: #3D2B1F; }
  .qr-grid span.l { background: #3D2B1F; opacity: .15; }
  .qr-grid span.m { background: #3D2B1F; opacity: .4; }
  .qr-label {
    font-size: 5.5px; color: rgba(255,255,255,.5);
    margin-top: 3px; letter-spacing: .08em; text-transform: uppercase;
  }
</style>
</head>

  </div>

  <!-- Region badge -->
  <div class="region-badge"><div class="region-dot">N</div></div>

  <!-- Top: branding + destination + title -->
  <div class="top-overlay">
    <div class="brand-line">Travel Like a Ugandan</div>
    <div class="dest-label">Destination</div>
    <div class="title">Murchison<br>Falls</div>
  </div>

  <!-- Center: fact -->
  <div class="fact-area">
    <div class="fact-line"></div>
    <div class="fact-text">The River Nile squeezes through a narrow 7-metre gorge before plunging about 43 metres, creating one of Uganda's most powerful waterfalls.</div>
    <div class="fact-line-bottom"></div>
  </div>

  <!-- Bottom: QR code -->
  <div class="bottom-overlay">
    <div class="qr-wrap">
      <div class="qr-box">
        <div class="qr-grid">

    </div>
  </div>
</div>
</body>
</html>
